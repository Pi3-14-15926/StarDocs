name: Deploy Rspress site to Pages

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Install dependencies
        run: pnpm install
      - name: Fix unquoted numbers in frontmatter
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          function fixDir(dir) {
            for (const f of fs.readdirSync(dir, {withFileTypes: true})) {
              const full = path.join(dir, f.name);
              if (f.isDirectory()) { fixDir(full); continue; }
              if (!f.name.endsWith('.md')) continue;
              let c = fs.readFileSync(full, 'utf8').replace(/^\uFEFF/, '');
              const m = c.match(/^---\r?\n([\s\S]*?)\r?\n---/);
              if (!m) continue;
              let yaml = m[1], changed = false;
              yaml = yaml.replace(/^(\w[\w-]*): (\S+)$/gm, (match, k, v) => {
                if (/^-?\d+(\.\d+)?$/.test(v) || v === 'true' || v === 'false') {
                  changed = true;
                  return k + ': \"' + v + '\"';
                }
                return match;
              });
              if (changed) {
                const newContent = c.replace(/^---\r?\n[\s\S]*?\r?\n---/, '---\n' + yaml + '\n---');
                fs.writeFileSync(full, newContent, 'utf8');
                console.log('Fixed: ' + full);
              }
            }
          }
          fixDir('docs');
          "
      - name: Build with Rspress
        run: pnpm run build
      - name: Install admin dependencies
        run: cd admin && pnpm install
      - name: Build admin
        run: cd admin && pnpm run build
      - name: Copy admin to doc_build
        run: cp -r admin-dist doc_build/admin
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc_build

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
